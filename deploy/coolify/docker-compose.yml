# Coolify deployment for the webcake-landing MCP server (REMOTE Streamable-HTTP mode).
#
# In Coolify:  + New  ->  Docker Compose  ->  pick this repo, then set
#   Base Directory:          /
#   Docker Compose Location:  /deploy/coolify/docker-compose.yml
# Deploy once, then add a Domain to the `webcake-mcp` service in the Coolify UI.
# Coolify substitutes that domain into SERVICE_FQDN_MCP below, and the Traefik
# labels route + TLS-terminate it for you.
#
# Your MCP endpoint is then   https://<your-domain>/mcp
# and a health probe lives at  https://<your-domain>/health
# See ./README.md for the full walkthrough and how clients pass their Webcake JWT.

services:
  webcake-mcp:
    build:
      # Build context = repo root, so the Dockerfile can see src/, package.json, …
      # NOTE: compose resolves a relative `context` against the PROJECT DIRECTORY,
      # not this file's location. Coolify runs with `--project-directory <repo root>`
      # (Base Directory `/`), so the context is `.` and the Dockerfile path is
      # repo-root-relative. (`../..` would overshoot to `/` and fail with
      # "lstat /deploy: no such file or directory".)
      context: .
      dockerfile: deploy/coolify/Dockerfile
    # tini as PID 1: proper signal forwarding + zombie reaping for `node`.
    init: true
    restart: unless-stopped
    # Wait for the cache + OAuth store to be reachable before starting.
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      # Coolify auto-generates SERVICE_FQDN_MCP from the domain configured in the
      # service UI. Set the domain there (e.g. mcp.example.com) and Coolify
      # substitutes it into the Traefik labels below at deploy time. The trailing
      # `/` is the path the domain maps to.
      SERVICE_FQDN_MCP: /
      # Port the server listens on (read by `serve`); keep in sync with `expose`
      # and the traefik loadbalancer port label.
      PORT: 8787
      # Target environment — picks the API + app base URLs by name (one source of truth):
      #   local   → api http://localhost:5800           app http://localhost:5173
      #   staging → api https://api.staging.webcake.io  app https://staging.webcake.io
      #   prod    → api https://api.webcake.io           app https://webcake.io
      # Clients can still override it per request via the `x-webcake-env` header / `?env=`.
      WEBCAKE_ENV: prod
      # ---- Storage backends -----------------------------------------------------
      # Redis = the CACHES (failed-create draft sources + image-rehost dedup map).
      # Disposable: losing it only makes the model re-send a source / re-upload an
      # image. Points at the `redis` service below over the internal network.
      REDIS_URL: redis://redis:6379
      # Postgres = the OAuth 2.1 store (clients, codes, access/refresh tokens) so a
      # restart / second instance keeps users logged in. DURABLE (volume below).
      # SERVICE_USER_POSTGRES / SERVICE_PASSWORD_POSTGRES are auto-generated by
      # Coolify and shared with the `postgres` service so the two always match.
      DATABASE_URL: postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/webcake_mcp
      # ---- render_preview screenshot engine -------------------------------------
      # The image bundles Playwright (see Dockerfile ENABLE_PLAYWRIGHT) and serves
      # GET /api/render/screenshot. RENDER_SCREENSHOT_BASE points render_preview's
      # fallover at THIS container (its own route); RENDER_SCREENSHOT_PRIMARY chooses
      # which engine to try FIRST — the OTHER is the automatic fallback:
      #   microlink → Microlink first, this host's Playwright as fallback. Microlink's
      #               free tier is PER IP, so on a shared multi-user host it exhausts
      #               fast and every call then wastes a 429 before falling to Playwright
      #               — set MICROLINK_API_KEY for a real quota if you keep this order.
      #   proxy     → this host's Playwright first (unlimited), Microlink as fallback.
      #               Best for a shared host; avoids the wasted Microlink attempt.
      # If you built with ENABLE_PLAYWRIGHT=0, remove these two lines (Microlink only).
      RENDER_SCREENSHOT_BASE: http://127.0.0.1:8787
      RENDER_SCREENSHOT_PRIMARY: microlink
      # Optional: a real Microlink quota (recommended when PRIMARY=microlink on a shared host).
      # MICROLINK_API_KEY: ${MICROLINK_API_KEY}
      # ---- Optional overrides ---------------------------------------------------
      # This server is MULTI-USER: each client sends its OWN Webcake JWT per request
      # (header `x-webcake-jwt` / `Authorization: Bearer`, or `?jwt=` in the URL), so
      # you normally do NOT set a token here. The explicit URLs below override WEBCAKE_ENV.
      # Add values in Coolify's "Environment Variables" UI (never commit secrets),
      # then uncomment the line(s) you need so they reach the container:
      # WEBCAKE_API_BASE: ${WEBCAKE_API_BASE}
      # WEBCAKE_APP_BASE: ${WEBCAKE_APP_BASE}
      # WEBCAKE_ORG_ID: ${WEBCAKE_ORG_ID}
      # WEBCAKE_JWT: ${WEBCAKE_JWT}   # SINGLE-TENANT only — a shared server secret
    # Traefik (Coolify's reverse proxy) reaches this container over the shared
    # `coolify` network; the port is published only internally.
    expose:
      - "8787"
    # For local `docker compose up` (or non-Coolify hosts) publish the port instead:
    # ports:
    #   - "8787:8787"
    networks:
      - coolify
    healthcheck:
      # Node has global fetch (no curl/wget needed in the alpine image).
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||8787)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.services.webcake-mcp.loadbalancer.server.port=8787"
      # HTTPS router — Coolify substitutes SERVICE_FQDN_MCP at deploy time.
      - "traefik.http.routers.webcake-mcp.rule=Host(`${SERVICE_FQDN_MCP}`)"
      - "traefik.http.routers.webcake-mcp.entrypoints=https"
      - "traefik.http.routers.webcake-mcp.tls=true"
      - "traefik.http.routers.webcake-mcp.tls.certresolver=letsencrypt"
      # HTTP → HTTPS redirect.
      - "traefik.http.routers.webcake-mcp-http.rule=Host(`${SERVICE_FQDN_MCP}`)"
      - "traefik.http.routers.webcake-mcp-http.entrypoints=http"
      - "traefik.http.routers.webcake-mcp-http.middlewares=webcake-mcp-redirect"
      - "traefik.http.middlewares.webcake-mcp-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.webcake-mcp-redirect.redirectscheme.permanent=true"

  # ---- Redis: the cache (drafts + image-rehost dedup) ------------------------
  # No published port and no auth: only reachable by webcake-mcp over the internal
  # `coolify` network. Persisted via AOF to a volume so the cache SURVIVES a
  # redeploy/restart (an in-progress draft isn't lost, images aren't re-uploaded).
  # Still best-effort: capped memory with allkeys-lru eviction when full.
  redis:
    image: redis:7-alpine
    init: true
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--appendonly", "yes"]
    volumes:
      - webcake-redis-data:/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---- Postgres: the DURABLE OAuth 2.1 store ---------------------------------
  # Credentials are Coolify-generated (SERVICE_USER_POSTGRES / SERVICE_PASSWORD_POSTGRES)
  # and reused verbatim in webcake-mcp's DATABASE_URL above, so they always match.
  # The named volume keeps issued tokens across redeploys. Tables are created by the
  # app on first connect (ensureOAuthSchema), so no init SQL is needed here.
  postgres:
    image: postgres:16-alpine
    init: true
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SERVICE_USER_POSTGRES}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: webcake_mcp
    volumes:
      - webcake-pg-data:/var/lib/postgresql/data
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d webcake_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  webcake-pg-data:
  webcake-redis-data:

networks:
  coolify:
    external: true
